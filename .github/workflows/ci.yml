name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-typecheck-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test

      - name: Build
        run: pnpm build

  prisma:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - name: Prisma generate
        run: pnpm --filter web exec prisma generate
      - name: Prisma migrate check
        run: pnpm --filter web exec prisma migrate status
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/zo_registry

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Docker build
        run: docker compose build

  e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: zo_registry
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Migrate
        run: pnpm --filter web exec prisma migrate deploy
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/zo_registry
      - name: Seed
        run: pnpm db:seed
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/zo_registry
      - name: Install Playwright
        run: pnpm --filter web exec npx playwright install --with-deps chromium
      - name: Start server
        run: |
          pnpm --filter web start &
          npx wait-on -t 60000 http://localhost:3001
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/zo_registry
      - name: E2E
        run: pnpm test:e2e
        env:
          BASE_URL: http://localhost:3001
          CI: true
